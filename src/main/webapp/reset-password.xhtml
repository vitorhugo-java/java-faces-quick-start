<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Reset Password – Faces App</ui:define>

    <ui:define name="content">
        <div class="auth-container">
            <p:card styleClass="auth-card">
                <f:facet name="header">
                    <h2>Reset Password</h2>
                </f:facet>

                <h:form id="resetForm">
                    <p:messages showDetail="true" closable="true"/>

                    <!-- Hidden token read from query-param -->
                    <h:inputHidden id="token" value="#{passwordResetController.token}"/>
                    <f:metadata>
                        <f:viewParam name="token" value="#{passwordResetController.token}"/>
                    </f:metadata>

                    <div class="field">
                        <p:outputLabel for="newPassword" value="New Password"/>
                        <p:password id="newPassword"
                                    value="#{passwordResetController.newPassword}"
                                    required="true"
                                    requiredMessage="New password is required."
                                    feedback="true"
                                    styleClass="w-full"/>
                        <p:message for="newPassword"/>
                    </div>

                    <div class="field">
                        <p:outputLabel for="confirmNewPassword" value="Confirm New Password"/>
                        <p:password id="confirmNewPassword"
                                    value="#{passwordResetController.confirmNewPassword}"
                                    required="true"
                                    requiredMessage="Please confirm your new password."
                                    feedback="false"
                                    styleClass="w-full"/>
                        <p:message for="confirmNewPassword"/>
                    </div>

                    <div class="field-actions">
                        <p:commandButton id="resetBtn"
                                         value="Set New Password"
                                         action="#{passwordResetController.resetPassword}"
                                         ajax="false"
                                         styleClass="p-button-primary w-full"/>
                    </div>
                </h:form>
            </p:card>
        </div>
    </ui:define>

</ui:composition>
</html>
