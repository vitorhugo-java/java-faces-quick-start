<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="title">Forgot Password – Faces App</ui:define>

    <ui:define name="content">
        <div class="auth-container">
            <p:card styleClass="auth-card">
                <f:facet name="header">
                    <h2>Forgot Password</h2>
                </f:facet>

                <h:form id="forgotForm">
                    <p:messages showDetail="true" closable="true"/>

                    <p>Enter your registered e-mail address and we will send you a reset link.</p>

                    <div class="field">
                        <p:outputLabel for="email" value="E-mail"/>
                        <p:inputText id="email"
                                     value="#{passwordResetController.email}"
                                     required="true"
                                     requiredMessage="E-mail is required."
                                     styleClass="w-full">
                            <f:validateRegex pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$"/>
                        </p:inputText>
                        <p:message for="email"/>
                    </div>

                    <div class="field-actions">
                        <p:commandButton id="requestResetBtn"
                                         value="Send Reset Link"
                                         action="#{passwordResetController.requestReset}"
                                         ajax="false"
                                         styleClass="p-button-primary w-full"/>
                    </div>

                    <div class="auth-links">
                        <h:link value="Back to Sign In" outcome="/login"/>
                    </div>
                </h:form>
            </p:card>
        </div>
    </ui:define>

</ui:composition>
</html>
